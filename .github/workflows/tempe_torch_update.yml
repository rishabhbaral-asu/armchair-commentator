name: Live Wire Update

on:
  schedule:
    - cron: '*/30 * * * *' # Runs every 30 minutes
  workflow_dispatch:      # Allows manual trigger via GitHub website

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests beautifulsoup4 pytz

      - name: Run Scraper
        run: python scripts/newsroom.py

      
      # NEW: This replaces the 'Commit and Push' steps
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Grabs the index.html created by your script

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
